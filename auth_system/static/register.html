<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<body>

<div class="container">

    <div class="content">

        <h1>✨ Create Your Account</h1>

        <h2>Get Started Today!</h2>

        <p class="subtitle">
            Create your account and unlock a secure, seamless experience.
        </p>

        <input type="text" id="username" placeholder="Username">

        <input type="email" id="email" placeholder="Email">

        <input type="password" id="password" placeholder="Password">

        <input type="password" id="confirmPassword" placeholder="Confirm Password">

        <button onclick="registerUser()">Register</button>

        <p id="message"></p>

        <p class="link">
            Already have an account?
            <a href="/static/login.html">Login Here</a>
        </p>

    </div>

    <div class="footer">

        <p class="quote">
            "Your account is the first step toward new opportunities.
            Register with confidence and begin your journey."
        </p>

        <p class="developer">
            Developed by <strong>Sudharsun</strong>
        </p>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
