<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker | Register</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>💰 Expense Tracker</h1>

        <h2>Create Your Account</h2>

        <p class="page-quote">

            "Every financial journey begins with the first step."

        </p>

        <input
        type="text"
        id="username"
        placeholder="👤 Username">

        <input
        type="email"
        id="email"
        placeholder="📧 Email Address">

        <input
        type="password"
        id="password"
        placeholder="🔒 Password">

        <input
        type="password"
        id="confirmPassword"
        placeholder="🔐 Confirm Password">

        <button onclick="registerUser()">

            Create Account

        </button>

        <p>

            Already have an account?

            <a href="/">

                Login Here

            </a>

        </p>

    </div>

</div>

<footer>

    © 2026 Expense Tracker

    <br>

    Developed by <strong>Sudharsun A</strong>

</footer>

<script src="/static/script.js"></script>

</body>

</html>
